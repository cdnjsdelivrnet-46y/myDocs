name: BUBT Scraper Runner

on:
  schedule:
    - cron: '*/15 * * * *' # প্রতি ১৫ মিনিট (GitHub-এ ৫ মিনিট অনেক সময় লেট করে, ১৫ মিনিট স্টেবল)
  workflow_dispatch:      # ম্যানুয়ালি রান করার বাটন যোগ করবে

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Scraper
        run: python main.py
